<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thalassemia Unit - Thammasat Hospital</title>
    <!-- Favicon: Atom -->
    <link rel="icon" type="image/png" href="https://img.icons8.com/ios-filled/50/1e88e5/atom.png">
    
    <!-- Frameworks -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        [x-cloak] { display: none !important; }
        
        html, body { height: 100%; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', 'Sarabun', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: #f1f5f9;
        }

        .main-wrapper {
            flex: 1 0 auto;
            background-image: linear-gradient(rgba(255, 255, 255, 0.45), rgba(255, 255, 255, 0.45)), url("https://poonnaphop.github.io/thalass/static/media/blood3.8b03985a0be9bac11946.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
        }

        /* --- Floating Label System (100% Match Screenshot) --- */
        .input-group {
            position: relative;
            margin-top: 10px;
        }

        .input-field {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #c4c4c4;
            border-radius: 4px;
            background: white;
            outline: none;
            transition: all 0.2s;
            font-size: 1rem;
            color: #1e293b;
        }

        .input-field:focus {
            border: 2px solid #1e88e5;
            padding: 11px 13px;
        }

        .input-label {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            padding: 0 5px;
            color: #757575;
            transition: all 0.2s ease-out;
            pointer-events: none;
            background: transparent;
        }

        .input-field:focus + .input-label,
        .input-field:not(:placeholder-shown) + .input-label {
            top: 0;
            transform: translateY(-50%) scale(0.8);
            background: white; 
            color: #1e88e5;
            font-weight: 600;
            left: 8px;
        }

        /* --- Group Box Styling (Matching Requirements) --- */
        .group-box {
            position: relative;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            padding: 1.25rem 1rem 1rem 1rem;
            margin-top: 1.25rem;
            background: rgba(255, 255, 255, 0.6);
        }

        .group-label {
            position: absolute;
            top: 0;
            left: 12px;
            transform: translateY(-50%);
            background: white;
            padding: 0 6px;
            font-size: 0.75rem;
            font-weight: 700;
            color: #6b7280;
            text-transform: uppercase;
        }

        /* Sticky Footer */
        .footer {
            flex-shrink: 0;
            background-color: #0d47a1;
            color: white;
            padding: 12px 24px;
            font-size: 0.85rem;
            width: 100%;
            text-align: left;
        }

        .tu-blue { background-color: #1e88e5; }
        
        .no-print { display: block; }
        @media print { .no-print { display: none !important; } }
    </style>

    <script>
        function thalassemiaApp() {
            return {
                view: 'login',
                testType: null,
                showPass: false,
                logoUrl: 'https://sawee-hosp.github.io/th/logo.jpg',
                thalTypes: ["Normal", "Alpha-thal 1 trait", "Alpha-thal 2 trait", "Beta-thal trait", "Hb E trait", "Homozygous Hb E", "Beta-thal / Hb E", "Hb H disease", "Hb H with CS", "Hb CS trait", "Homozygous CS", "EA with Alpha-thal 1", "EE with Alpha-thal 1", "Beta-thal Major", "Delta-Beta Trait", "Alpha-1 / Beta-thal Trait", "Homozygous Beta", "Hb Bart's Hydrops", "AE Bart's Disease", "EF Bart's Disease", "Hb Hope / Variants", "HPFH"],
                labItems: ['MCV', 'MCH', 'Hb A', 'OF', 'Hb F', 'Hb Cs', 'Hb Bart', 'DCIP', 'Hb H', 'A2', 'Hb A2 + E'],

                formData: {
                    wife: { name: '', surname: '', age: '', hn: '' },
                    husband: { name: '', surname: '', age: '', hn: '' },
                    pregnancy: { gravid: '', para: '', abortion: '', living: '', edc: '', ga_weeks: '', ga_days: '', hospital: 'รพธ.', history: '' }
                },

                labData: {
                    wife: { knowOrder: false, orderType: '', dcip: 'Unknown', of: 'Unknown', hbeLogic: 'none', mcv: '', mch: '', hba: '', hba2: '', hbf: '', hbcs: '', hbbart: '', hbh: '', hba2e: '', hba2_sep: '', hbe_sep: '', typing: '' },
                    husband: { knowOrder: false, orderType: '', dcip: 'Unknown', of: 'Unknown', hbeLogic: 'none', mcv: '', mch: '', hba: '', hba2: '', hbf: '', hbcs: '', hbbart: '', hbh: '', hba2e: '', hba2_sep: '', hbe_sep: '', typing: '' }
                },

                result: { consultant: '', wifeType: '', husbandType: '', riskText: '', recommendation: '', appointmentDate: '', appWeeks: '', appDays: '', remarks: '', ready: false },

                init() {
                    // FIXED: Using a more stable and reliable font source that supports cross-origin requests
                    if (typeof pdfMake !== 'undefined') {
                        pdfMake.fonts = {
                            Sarabun: {
                                normal: 'https://cdn.jsdelivr.net/gh/font-thai/sarabun@master/Sarabun-Regular.ttf',
                                bold: 'https://cdn.jsdelivr.net/gh/font-thai/sarabun@master/Sarabun-Bold.ttf'
                            },
                            Roboto: {
                                normal: 'https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.66/fonts/Roboto/Roboto-Regular.ttf',
                                bold: 'https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.66/fonts/Roboto/Roboto-Medium.ttf'
                            }
                        };
                    }
                },

                getKey(item) {
                    return item.toLowerCase().replace(/\s+/g, '').replace('\'', '').replace('+', '');
                },

                generateResult() {
                    const wT = this.labData.wife.knowOrder ? `${this.labData.wife.orderType}. ${this.thalTypes[this.labData.wife.orderType-1]}` : (this.labData.wife.typing || "A2A (Normal)");
                    const hT = this.labData.husband.knowOrder ? `${this.labData.husband.orderType}. ${this.thalTypes[this.labData.husband.orderType-1]}` : (this.labData.husband.typing || "A2A (Normal)");
                    
                    this.result.wifeType = wT;
                    this.result.husbandType = hT;
                    this.result.riskText = "มีความเสี่ยงต้องส่งเลือดตรวจวิเคราะห์ระดับ DNA ส่งตรวจ: คู่สมรสควรตรวจ Alpha, beta";
                    this.result.recommendation = "จำเป็นต้องตรวจ PCR for Alpha ทั้งคู่ และ PCR for Beta ทั้งคู่";
                    this.result.ready = true;
                    this.view = 'result';
                    window.scrollTo(0, 0);
                },

                printPDF() {
                    if (!this.result.ready) return;
                    
                    const v = (val) => val ? String(val) : '';

                    const dd = {
                        pageSize: 'A4',
                        pageMargins: [40, 30, 40, 30],
                        content: [
                            { columns: [{ text: '', width: '*' }, { image: 'logo', width: 130, alignment: 'right' }] },
                            { stack: [
                                { text: 'ศูนย์พัฒนาสู่ความเป็นเลิศการคัดกรองและวินิจฉัยก่อนคลอด', style: 'h1' },
                                { text: 'โรคโลหิตจางธาลัสซีเมีย โรงพยาบาลธรรมศาสตร์เฉลิมพระเกียรติ', style: 'h1' },
                                { text: '\nแบบบันทึกการให้คำปรึกษาแก่คู่สมรสที่มีความเสี่ยงต่อการบุตรเป็นโรคธาลัสซีเมีย', style: 'h2' }
                            ], alignment: 'center', margin: [0, -35, 0, 10] },
                            { text: `วันที่ ......${new Date().toLocaleDateString('th-TH')}........`, margin: [0, 5, 0, 10], bold: true },
                            {
                                table: {
                                    widths: ['32%', '32%', '36%'],
                                    body: [[
                                        { stack: [{text:'ภรรยา', bold:true}, `ชื่อ-สกุล: ${v(this.formData.wife.name)} ${v(this.formData.wife.surname)}`, `อายุ: ${v(this.formData.wife.age)} ปี`, `HN: ${v(this.formData.wife.hn)}`] },
                                        { stack: [{text:'สามี', bold:true}, `ชื่อ-สกุล: ${v(this.formData.husband.name)} ${v(this.formData.husband.surname)}`, `อายุ: ${v(this.formData.husband.age)} ปี`, `HN: ${v(this.formData.husband.hn)}`] },
                                        { stack: [`Gravid: ${v(this.formData.pregnancy.gravid)}  Para: ${v(this.formData.pregnancy.para)}`, `Abortion: ${v(this.formData.pregnancy.abortion)}  Living: ${v(this.formData.pregnancy.living)}`, `EDC: ${v(this.formData.pregnancy.edc)}`, `GA: ${v(this.formData.pregnancy.ga_weeks)} week ${v(this.formData.pregnancy.ga_days)} day`, `ส่งมารับคำปรึกษาจาก: [x] ${v(this.formData.pregnancy.hospital)}`] }
                                    ]]
                                }
                            },
                            {
                                table: {
                                    widths: ['22%', '39%', '39%'], margin: [0, 10, 0, 0],
                                    body: [
                                        [{text:'รายการตรวจ', bold:true, alignment:'center'}, {text:'ภรรยา', bold:true, alignment:'center'}, {text:'สามี', bold:true, alignment:'center'}],
                                        ['MCV', v(this.labData.wife.mcv), v(this.labData.husband.mcv)],
                                        ['MCH', v(this.labData.wife.mch), v(this.labData.husband.mch)],
                                        ['Hb A', v(this.labData.wife.hba), v(this.labData.husband.hba)],
                                        ['OF', v(this.labData.wife.of), v(this.labData.husband.of)],
                                        ['Hb F', v(this.labData.wife.hbf), v(this.labData.husband.hbf)],
                                        ['Hb Cs', v(this.labData.wife.hbcs), v(this.labData.husband.hbcs)],
                                        ['Hb Bart', v(this.labData.wife.hbbart), v(this.labData.husband.hbbart)],
                                        ['DCIP', v(this.labData.wife.dcip), v(this.labData.husband.dcip)],
                                        ['Hb H', v(this.labData.wife.hbh), v(this.labData.husband.hbh)],
                                        ['A2', v(this.labData.wife.hba2), v(this.labData.husband.hba2)],
                                        ['Hb A2 + E', v(this.labData.wife.hba2e), v(this.labData.husband.hba2e)],
                                        [{text:'Hb Typing', bold:true}, {text:v(this.result.wifeType), alignment:'center'}, {text:v(this.result.husbandType), alignment:'center'}]
                                    ]
                                }
                            },
                            { text: `\nประวัติเพิ่มเติม : ${v(this.formData.pregnancy.history)}`, margin: [0, 5, 0, 5] },
                            {
                                table: {
                                    widths: ['15%', '45%', '40%'], margin: [0, 10, 0, 0],
                                    body: [
                                        [{text:'ตรวจหา', bold:true, alignment:'center'}, {text:'รายการตรวจ', bold:true, alignment:'center'}, {text:'ผลการตรวจ', bold:true, alignment:'center'}],
                                        ['ภรรยา', '[ ] PCR for alpha      [ ] PCR for beta', 'Alpha: - \nBeta: -'],
                                        ['สามี', '[ ] PCR for alpha      [ ] PCR for beta', 'Alpha: - \nBeta: -']
                                    ]
                                }
                            },
                            { stack: [{ text: '\nสรุป', bold: true }, { text: '  2.1 มีความเสี่ยงที่จะเป็นคู่เสี่ยงธาลัสซีเมียชนิดรุนแรง Hb Bart’s hydrop fetalis' }, { text: '  2.2 มีความเสี่ยงที่จะเป็นคู่เสี่ยงธาลัสซีเมียชนิดรุนแรง Homozygous Beta-thalassemia ชนิด Bo/ Bo' }, { text: '\nข้อเสนอแนะ', bold: true }, { text: `  ${v(this.result.recommendation)}` }], margin: [0, 5, 0, 0] },
                            { columns: [{ text: '', width: '*' }, { stack: [{ text: '\nลงนาม ................................................................ แพทย์/พยาบาลผู้ให้คำปรึกษา', margin: [0, 10, 0, 0] }, { text: `( ${v(this.result.consultant)} )`, alignment: 'center' }] }] },
                            { text: `\nนัดหมาย วันที่ ............................................. อายุครรภ์ ............ สัปดาห์ ............ วัน` },
                            { text: `\nหมายเหตุ: ${v(this.result.remarks)}` }
                        ],
                        images: { logo: this.logoUrl },
                        styles: { h1: { fontSize: 13, bold: true }, h2: { fontSize: 11, bold: true } },
                        defaultStyle: { font: 'Sarabun', fontSize: 10 }
                    };
                    
                    // OPEN IN NEW TAB
                    try {
                        const pdfDocGenerator = pdfMake.createPdf(dd);
                        pdfDocGenerator.open({}, window);
                    } catch (e) {
                        console.error('PDF generation error:', e);
                        // Fallback to browser print if pdfMake fails completely
                        window.print();
                    }
                }
            };
        }
    </script>
    <!-- Alpine.js Load -->
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
</head>
<body x-data="thalassemiaApp()" x-init="init()" x-cloak>

    <div class="main-wrapper">
        <!-- Navbar -->
        <nav class="tu-blue text-white shadow-lg px-4 py-3 flex justify-between items-center no-print">
            <div class="flex items-center gap-3">
                <svg @click="view = 'menu'" class="w-6 h-6 cursor-pointer" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                <span class="text-xl font-semibold uppercase tracking-tight">Thalassemia Unit</span>
            </div>
            <div @click="view = 'login'" class="w-8 h-8 bg-white/20 rounded-full flex items-center justify-center cursor-pointer hover:bg-white/30 transition">
                <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 20 20"><path d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"></path></svg>
            </div>
        </nav>

        <!-- PAGE: Login -->
        <div x-show="view === 'login'" class="flex-grow flex items-center justify-center p-4">
            <div class="bg-white p-10 rounded shadow-2xl w-full max-w-sm text-center">
                <div class="bg-purple-600 w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-4 text-white shadow-lg">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"></path></svg>
                </div>
                <h2 class="text-xl font-normal text-gray-700 mb-8">Sign in</h2>
                <div class="input-group"><input type="text" class="input-field" placeholder=" " value="admin"><label class="input-label">id *</label></div>
                <div class="input-group relative">
                    <input :type="showPass ? 'text' : 'password'" class="input-field pr-10" placeholder=" " value="admin">
                    <label class="input-label">Password *</label>
                    <button @click="showPass = !showPass" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-blue-500 transition">
                        <svg x-show="!showPass" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                        <svg x-show="showPass" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18"/></svg>
                    </button>
                </div>
                <button @click="view = 'menu'" class="w-full tu-blue text-white py-2.5 rounded shadow-md font-bold uppercase text-sm tracking-widest mt-6 hover:bg-blue-700 transition">SIGN IN</button>
            </div>
        </div>

        <!-- PAGE: Menu -->
        <div x-show="view === 'menu'" x-cloak class="max-w-5xl mx-auto mt-24 p-6 grid grid-cols-1 md:grid-cols-2 gap-10">
            <button @click="testType = 'typing'; view = 'info'" class="bg-white/90 p-16 rounded shadow-xl hover:shadow-2xl transition font-bold text-gray-700 text-xl border uppercase tracking-widest">HB TYPING</button>
            <button @click="testType = 'dna'; view = 'info'" class="bg-white/90 p-16 rounded shadow-xl hover:shadow-2xl transition font-bold text-gray-700 text-xl border uppercase tracking-widest text-center">Alpha & Beta Test</button>
        </div>

        <!-- PAGE: Info -->
        <div x-show="view === 'info'" x-cloak class="max-w-6xl mx-auto p-6 space-y-8 pb-32 animate-fadeIn">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="bg-white p-8 rounded shadow border">
                    <h3 class="text-xl font-bold text-tu-blue mb-8 border-b pb-2">Wife</h3>
                    <div class="input-group"><input type="text" x-model="formData.wife.name" class="input-field" placeholder=" "><label class="input-label">Name</label></div>
                    <div class="input-group"><input type="text" x-model="formData.wife.surname" class="input-field" placeholder=" "><label class="input-label">Surname</label></div>
                    <div class="input-group"><input type="number" x-model="formData.wife.age" class="input-field" placeholder=" "><label class="input-label">Age (years old)</label></div>
                    <div class="input-group"><input type="text" x-model="formData.wife.hn" class="input-field" placeholder=" "><label class="input-label">HN</label></div>
                </div>
                <div class="bg-white p-8 rounded shadow border">
                    <h3 class="text-xl font-bold text-tu-blue mb-8 border-b pb-2">Husband</h3>
                    <div class="input-group"><input type="text" x-model="formData.husband.name" class="input-field" placeholder=" "><label class="input-label">Name</label></div>
                    <div class="input-group"><input type="text" x-model="formData.husband.surname" class="input-field" placeholder=" "><label class="input-label">Surname</label></div>
                    <div class="input-group"><input type="number" x-model="formData.husband.age" class="input-field" placeholder=" "><label class="input-label">Age (years old)</label></div>
                    <div class="input-group"><input type="text" x-model="formData.husband.hn" class="input-field" placeholder=" "><label class="input-label">HN</label></div>
                </div>
            </div>
            <div class="bg-white p-8 rounded shadow border">
                <h3 class="text-xl font-bold text-tu-blue mb-8 border-b pb-2">Pregnancy Information</h3>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                    <div class="input-group"><input type="text" x-model="formData.pregnancy.gravid" class="input-field" placeholder=" "><label class="input-label">Gravid</label></div>
                    <div class="input-group"><input type="text" x-model="formData.pregnancy.para" class="input-field" placeholder=" "><label class="input-label">Para</label></div>
                    <div class="input-group"><input type="text" x-model="formData.pregnancy.abortion" class="input-field" placeholder=" "><label class="input-label">Abortion</label></div>
                    <div class="input-group"><input type="text" x-model="formData.pregnancy.living" class="input-field" placeholder=" "><label class="input-label">Living</label></div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mt-4">
                    <div class="input-group"><input type="date" x-model="formData.pregnancy.edc" class="input-field" placeholder=" "><label class="input-label">EDC</label></div>
                    <div class="flex gap-4"><div class="input-group flex-1"><input type="number" x-model="formData.pregnancy.ga_weeks" class="input-field" placeholder=" "><label class="input-label">weeks</label></div><div class="input-group flex-1"><input type="number" x-model="formData.pregnancy.ga_days" class="input-field" placeholder=" "><label class="input-label">days</label></div></div>
                </div>
                <div class="mt-4 flex items-center gap-6">
                    <span class="font-bold text-gray-700">Hospital:</span>
                    <label class="flex items-center gap-2 cursor-pointer"><input type="radio" value="รพธ." x-model="formData.pregnancy.hospital"> รพธ.</label>
                    <label class="flex items-center gap-2 cursor-pointer"><input type="radio" value="อื่นๆ" x-model="formData.pregnancy.hospital"> อื่นๆ</label>
                </div>
            </div>
            <div class="flex justify-end gap-4 pb-20 no-print">
                <button @click="view = 'menu'" class="px-8 py-2 text-gray-500 font-medium">BACK</button>
                <button @click="view = 'lab'" class="px-12 py-2 tu-blue text-white rounded shadow-md font-bold hover:bg-blue-700 transition">NEXT</button>
            </div>
        </div>

        <!-- PAGE: Lab -->
        <div x-show="view === 'lab'" x-cloak class="max-w-4xl mx-auto p-6 space-y-12 pb-40 animate-fadeIn">
            <template x-for="person in ['wife', 'husband']" :key="person">
                <div class="bg-white p-8 rounded shadow-lg border border-gray-100">
                    <h3 class="text-xl font-bold text-gray-800 mb-8 uppercase border-b pb-2" x-text="person === 'wife' ? 'Mother' : 'Father'"></h3>
                    
                    <div class="input-group mb-8">
                        <div class="flex items-center gap-3 bg-blue-50 p-4 rounded border border-blue-100">
                            <input type="checkbox" x-model="labData[person].knowOrder" :id="'k_'+person" class="w-5 h-5 rounded text-blue-600">
                            <label :for="'k_'+person" class="font-bold text-tu-blue cursor-pointer">Know Order?</label>
                            <div x-show="labData[person].knowOrder" class="flex-1 ml-4 animate-fadeIn">
                                <div class="input-group !mt-0">
                                    <select x-model="labData[person].orderType" class="input-field !py-2 border-gray-300 font-bold text-blue-800">
                                        <option value="">-- Choose Type --</option>
                                        <template x-for="(name, index) in thalTypes" :key="index"><option :value="index+1" x-text="(index+1) + '. ' + name"></option></template>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-x-6 gap-y-1">
                        <div class="group-box">
                            <span class="group-label">DCIP</span>
                            <div class="flex justify-between mt-1 text-sm">
                                <label class="cursor-pointer flex items-center gap-1"><input type="radio" value="Positive" x-model="labData[person].dcip"> Positive</label>
                                <label class="cursor-pointer flex items-center gap-1"><input type="radio" value="Negative" x-model="labData[person].dcip"> Negative</label>
                                <label class="cursor-pointer flex items-center gap-1"><input type="radio" value="Unknown" x-model="labData[person].dcip"> Unknown</label>
                            </div>
                        </div>
                        <div class="group-box">
                            <span class="group-label">OF</span>
                            <div class="flex justify-between mt-1 text-sm">
                                <label class="cursor-pointer flex items-center gap-1"><input type="radio" value="Positive" x-model="labData[person].of"> Positive</label>
                                <label class="cursor-pointer flex items-center gap-1"><input type="radio" value="Negative" x-model="labData[person].of"> Negative</label>
                                <label class="cursor-pointer flex items-center gap-1"><input type="radio" value="Unknown" x-model="labData[person].of"> Unknown</label>
                            </div>
                        </div>
                        
                        <template x-for="item in labItems" :key="item">
                            <div class="input-group" x-show="!['DCIP','OF','A2','Hb A2 + E'].includes(item)">
                                <input type="text" class="input-field" placeholder=" " x-model="labData[person][getKey(item)]">
                                <label class="input-label" x-text="item"></label>
                            </div>
                        </template>

                        <div class="col-span-2 group-box mt-4 border-gray-300">
                            <span class="group-label">HbE</span>
                            <div class="space-y-4 mt-2 text-sm">
                                <label class="flex items-center gap-3 cursor-pointer"><input type="radio" value="combined" x-model="labData[person].hbeLogic" class="text-blue-600"> <span class="text-gray-700 font-medium">HbA2 + E</span></label>
                                <div x-show="labData[person].hbeLogic === 'combined'" class="pl-7"><div class="input-group"><input type="text" class="input-field" placeholder=" " x-model="labData[person].hba2e"><label class="input-label">HbA2 + E Value</label></div></div>
                                <label class="flex items-center gap-3 cursor-pointer"><input type="radio" value="separate" x-model="labData[person].hbeLogic" class="text-blue-600"> <span class="text-gray-700 font-medium">Separate HbA2 and E</span></label>
                                <div x-show="labData[person].hbeLogic === 'separate'" class="pl-7 grid grid-cols-2 gap-4 animate-fadeIn"><div class="input-group"><input type="text" class="input-field" placeholder=" " x-model="labData[person].hba2_sep"><label class="input-label">HbA2 Value</label></div><div class="input-group"><input type="text" class="input-field" placeholder=" " x-model="labData[person].hbe_sep"><label class="input-label">E Value</label></div></div>
                                <label class="flex items-center gap-3 cursor-pointer"><input type="radio" value="none" x-model="labData[person].hbeLogic" class="text-blue-600"> <span class="text-gray-700 font-medium">Don't have Hb E</span></label>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
            <div class="flex justify-between items-center"><button @click="view = 'info'" class="px-8 py-2 text-gray-500 font-medium">BACK</button><button @click="generateResult()" class="px-16 py-3 tu-blue text-white rounded shadow-xl font-bold uppercase tracking-widest">SUBMIT</button></div>
        </div>

        <!-- PAGE: Result -->
        <div x-show="view === 'result' && result.ready" x-cloak class="max-w-6xl mx-auto p-6 space-y-8 pb-40 animate-fadeIn">
            <div class="bg-white p-10 rounded shadow-2xl border border-gray-100">
                <h1 class="text-2xl font-bold text-center mb-10 text-gray-800 uppercase tracking-tight border-b-2 border-tu-blue pb-4">HB Typing Screening Result</h1>
                <div class="mb-10 flex flex-col md:flex-row gap-4 items-end border-b pb-4"><span class="font-bold text-tu-blue whitespace-nowrap text-lg">Consultant Name:</span><input type="text" x-model="result.consultant" class="flex-1 outline-none text-tu-blue font-bold border-none px-2 text-xl focus:border-b-2 focus:border-blue-500"></div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-10 mb-10">
                    <div class="bg-blue-50 p-6 rounded border-l-8 border-blue-600 shadow-inner"><h4 class="font-bold text-tu-blue mb-4 border-b border-blue-200 pb-1 uppercase tracking-tight">WIFE RESULTS</h4><p class="text-lg">Type: <span class="text-red-600 font-bold text-2xl" x-text="result.wifeType"></span></p></div>
                    <div class="bg-green-50 p-6 rounded border-l-8 border-green-600 shadow-inner"><h4 class="font-bold text-green-900 mb-4 border-b border-green-200 pb-1 uppercase tracking-tight">HUSBAND RESULTS</h4><p class="text-lg">Type: <span class="text-red-600 font-bold text-2xl" x-text="result.husbandType"></span></p></div>
                </div>
                <div class="space-y-6">
                    <div class="p-6 bg-white rounded border-l-8 border-red-500 shadow-md"><h4 class="font-bold text-xl mb-3 text-gray-800 underline decoration-red-500 underline-offset-8">Risk Evaluation</h4><p class="text-lg text-gray-700 font-medium" x-text="result.riskText"></p></div>
                    <div class="p-6 bg-white rounded border-l-8 border-blue-500 shadow-md"><h4 class="font-bold text-lg mb-3 text-gray-800 underline decoration-blue-500 underline-offset-8">Recommendations</h4><p class="text-gray-700 text-lg" x-text="result.recommendation"></p></div>
                </div>
                <div class="flex justify-between items-center mt-16 no-print">
                    <button @click="location.reload()" class="text-gray-400 hover:text-red-600 font-medium transition uppercase tracking-widest text-xs">Clear All Entries</button>
                    <button @click="printPDF()" class="px-16 py-3 tu-blue text-white rounded shadow-lg font-bold uppercase tracking-widest text-lg hover:bg-blue-700 transition">PRINT PDF</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Sticky Footer -->
    <footer class="footer no-print">
        <span class="font-semibold uppercase tracking-wider">Copyright © 2025 Thammasart Hospital University, Thailand.</span>
    </footer>

</body>
</html>
